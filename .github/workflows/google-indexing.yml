name: Google Indexing API

on:
  push:
    branches: [main]
    paths:
      - '_posts/**'

jobs:
  index:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 변경된 포스트 파일 감지
        id: changed
        run: |
          git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- '_posts/*.md' > /tmp/changed_posts.txt || true
          if [ -s /tmp/changed_posts.txt ]; then
            echo "has_posts=true" >> $GITHUB_OUTPUT
            echo "변경된 포스트:"
            cat /tmp/changed_posts.txt
          else
            echo "has_posts=false" >> $GITHUB_OUTPUT
          fi

      - name: Python 세팅
        if: steps.changed.outputs.has_posts == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성 설치
        if: steps.changed.outputs.has_posts == 'true'
        run: pip install google-auth requests

      - name: Google Indexing API 요청
        if: steps.changed.outputs.has_posts == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 scripts/google-indexing.py --file /tmp/changed_posts.txt
